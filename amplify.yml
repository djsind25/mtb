version: 1
applications:
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
  - appRoot: site
    frontend:
      phases:
        build:
          commands:
            - echo "static site, no build step"
      artifacts:
        baseDirectory: .
        files:
          - '**/*'
      cache:
        paths: []
